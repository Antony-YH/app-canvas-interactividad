<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Glass Ascend</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100 text-light">
    
    <div class="bg-image-overlay"></div>

    <div class="content-wrapper d-flex flex-column min-vh-100">
        <nav class="navbar navbar-expand-lg glass-panel neon-border-bottom sticky-top">
            <div class="container">
                <a class="navbar-brand fw-bold neon-text-cyan" href="#">🌌 NEON ASCEND</a>
                <div class="ms-auto text-end text-light opacity-75">
                    <small>Dev: <strong class="neon-text-pink">Tu Nombre</strong></small>
                </div>
            </div>
        </nav>

        <main class="container flex-grow-1 d-flex flex-column justify-content-center align-items-center py-5">
            
            <div class="stats-panel glass-panel neon-box-cyan w-100 mb-4 p-4 rounded-4 d-flex justify-content-around align-items-center" style="max-width: 650px;">
                <div class="text-center">
                    <h5 class="text-uppercase neon-text-green small mb-1">Nivel</h5>
                    <h2 class="mb-0 neon-text-green fw-bold"><span id="ui-level">1</span> / 10</h2>
                </div>
                <div class="text-center border-start border-end neon-border-dark px-4">
                    <h5 class="text-uppercase neon-text-green small mb-1">Eliminados</h5>
                    <h2 class="mb-0 neon-text-pink fw-bold">
                        <span id="ui-score">0</span> 
                    </h2>
                </div>
                <div class="text-center">
                    <h5 class="text-uppercase neon-text-green small mb-1">Progreso</h5>
                    <h2 class="mb-0 neon-text-cyan fw-bold"><span id="ui-percent">0</span>%</h2>
                </div>
            </div>

            <div class="canvas-container glass-panel neon-box-pink rounded-4 overflow-hidden">
                <canvas id="canvas-rebote"></canvas>
            </div>
            
            <div id="game-over-msg" class="text-center mt-4 d-none p-3 glass-panel rounded-3 neon-box-green">
                <h3 class="neon-text-green fw-bold text-uppercase mb-3">¡Matriz Completada!</h3>
                <button class="btn neon-btn-cyan" onclick="location.reload()">Reiniciar Sistema</button>
            </div>

        </main>

        <footer class="glass-panel neon-border-top py-3 mt-auto">
            <div class="container text-center">
                <p class="mb-0 text-light opacity-50 small">
                    &copy; 2026 Neon Glass Ascend. // Programador: <strong>Tu Nombre</strong>
                </p>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/main.js"></script>
</body>
</html>
